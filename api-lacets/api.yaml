apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacets-api
  labels:
    app: lacets
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacets
      tier: api
  template:
    metadata:
      labels:
        app: lacets
        tier: api
    spec:
      containers:
        - name: lacets-api
          image: slydxn/lacets-api:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_USERNAME
              value: lacets
            - name: DB_USERNAME_PASSWORD
              value: lacetspassword
            - name: DB_NAME
              value: api_example
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lacets-api
  labels:
    app: lacets
    tier: api
spec:
  type: ClusterIP
  selector:
    app: lacets
    tier: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lacets-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lacets-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
