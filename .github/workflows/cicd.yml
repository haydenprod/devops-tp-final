
name: CI/CD lacets

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # Dès que ton self-hosted fonctionnera, remplace ubuntu-latest par self-hosted
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: lacets-api
      IMAGE_TAG: latest
      # Exemple avec GitHub Container Registry, à adapter si tu utilises Docker Hub
      REGISTRY: ghcr.io
      REPOSITORY: haydenprod/devops-tp-final

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      # 1. Configurer l'infra (exemple : installation de kubectl)
      - name: Installer kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      # Ici tu devras ajouter la config d'accès à ton cluster k3s
      # (par exemple en copiant un kubeconfig depuis un secret ou en utilisant ssh)
      - name: Configurer l’accès au cluster (À ADAPTER)
        run: |
          echo "TODO: copier le kubeconfig ou configurer l'accès à k3s ici"
          # Exemple : mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" > ~/.kube/config
          # puis kubectl get nodes

      # 2. Builder l'image
      - name: Connexion à la registry (À ADAPTER)
        run: |
          echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u "$REGISTRY_USER" --password-stdin

      - name: Build de l’image Docker
        run: |
          cd api-lacets
          docker build -t $REGISTRY/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push de l’image Docker
        run: |
          docker push $REGISTRY/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG

      # 3. Déployer sur l’infra k3s
      - name: Appliquer les manifests Kubernetes
        run: |
          kubectl apply -f k8s/mysql.yaml
          kubectl apply -f k8s/api.yaml

      - name: Vérifier les pods
        run: |
          kubectl get pods -A
