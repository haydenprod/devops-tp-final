name: CI/CD lacets

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Quand ton self-hosted marchera : runs-on: self-hosted

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Docker
        uses: docker/setup-buildx-action@v3

      - name: Installer kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Configurer l’accès au cluster (À ADAPTER)
        run: |
          echo "TODO: config k3s (kubeconfig) ici"

      - name: Build de l’image Docker
        run: |
          cd api-lacets
          docker build -t lacets-api:latest .

      - name: Déployer sur k3s
        run: |
          kubectl apply -f k8s/mysql.yaml
          kubectl apply -f k8s/api.yaml

      - name: Vérifier les pods
        run: |
          kubectl get pods -A
